<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InTech — Recuperar contraseña</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px }
  .auth-box { background:var(--surface); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:44px 48px; width:440px; max-width:100% }
  .back-link { display:flex; align-items:center; gap:6px; color:var(--text-3); font-size:.85rem; margin-bottom:28px }
  .back-link:hover { color:var(--brand); text-decoration:none }
  .icon-wrap { width:64px; height:64px; background:var(--brand-light); border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin-bottom:20px }
</style>
</head>
<body>

<div class="auth-box">
  <a href="../index.html" class="back-link">← Volver al login</a>
  <div class="icon-wrap">🔑</div>
  <h2 style="font-family:var(--font-head);margin-bottom:8px">Recuperar contraseña</h2>
  <p style="color:var(--text-3);font-size:.9rem;margin-bottom:28px">
    Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
  </p>

  <div id="alert-msg" class="alert alert-danger hidden"></div>
  <div id="success-msg" class="alert alert-success hidden"></div>

  <form id="forgot-form" novalidate>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full mt-16" id="btn-send">
      Enviar enlace de recuperación
    </button>
  </form>
</div>

<script>
const API = 'http://localhost:3000/api';
document.getElementById('forgot-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email   = document.getElementById('email').value.trim();
  const alertEl = document.getElementById('alert-msg');
  const succEl  = document.getElementById('success-msg');
  const btn     = document.getElementById('btn-send');
  alertEl.classList.add('hidden');
  btn.textContent = 'Enviando...';
  btn.disabled = true;
  try {
    const res  = await fetch(`${API}/auth/forgot-password`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    succEl.textContent = data.message || 'Si el correo existe, recibirás un enlace en breve.';
    succEl.classList.remove('hidden');
  } catch {
    alertEl.textContent = 'Error al enviar. Intenta de nuevo.';
    alertEl.classList.remove('hidden');
  } finally {
    btn.textContent = 'Enviar enlace de recuperación';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
