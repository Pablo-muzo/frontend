<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InTech — Nueva contraseña</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px }
  .auth-box { background:var(--surface); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); padding:44px 48px; width:440px; max-width:100% }
  .pass-wrap { position:relative }
  .pass-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-3) }
</style>
</head>
<body>
<div class="auth-box">
  <div style="font-size:2rem;margin-bottom:16px">🔒</div>
  <h2 style="font-family:var(--font-head);margin-bottom:8px">Nueva contraseña</h2>
  <p style="color:var(--text-3);font-size:.9rem;margin-bottom:28px">Elige una contraseña segura para tu cuenta.</p>

  <div id="alert-msg" class="alert alert-danger hidden"></div>
  <div id="success-msg" class="alert alert-success hidden"></div>

  <form id="reset-form" novalidate>
    <div class="form-group">
      <label>Nueva contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
        <button type="button" class="pass-toggle" onclick="const p=document.getElementById('password');p.type=p.type==='password'?'text':'password'">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="confirm" class="form-control" placeholder="Repite la contraseña" required>
        <button type="button" class="pass-toggle" onclick="const p=document.getElementById('confirm');p.type=p.type==='password'?'text':'password'">👁</button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full mt-16" id="btn-reset">Cambiar contraseña</button>
  </form>
</div>

<script>
const API = 'http://localhost:3000/api';
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('alert-msg').textContent = 'Token inválido. Solicita un nuevo enlace.';
  document.getElementById('alert-msg').classList.remove('hidden');
  document.getElementById('reset-form').style.display = 'none';
}

document.getElementById('reset-form').addEventListener('submit', async e => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const alertEl  = document.getElementById('alert-msg');
  const succEl   = document.getElementById('success-msg');
  alertEl.classList.add('hidden');

  if (password !== confirm) {
    alertEl.textContent = 'Las contraseñas no coinciden';
    alertEl.classList.remove('hidden');
    return;
  }
  if (password.length < 8) {
    alertEl.textContent = 'Mínimo 8 caracteres';
    alertEl.classList.remove('hidden');
    return;
  }

  document.getElementById('btn-reset').textContent = 'Actualizando...';
  try {
    const res  = await fetch(`${API}/auth/reset-password`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    succEl.textContent = '¡Contraseña actualizada! Redirigiendo al login...';
    succEl.classList.remove('hidden');
    document.getElementById('reset-form').style.display = 'none';
    setTimeout(() => window.location.href = '../index.html', 2000);
  } catch (err) {
    alertEl.textContent = err.message;
    alertEl.classList.remove('hidden');
  } finally {
    document.getElementById('btn-reset').textContent = 'Cambiar contraseña';
  }
});
</script>
</body>
</html>
