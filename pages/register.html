<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InTech — Crear cuenta</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px }
  .auth-box {
    background:var(--surface); border-radius:var(--radius-xl);
    box-shadow:var(--shadow-lg); padding:44px 48px;
    width:480px; max-width:100%;
  }
  .back-link { display:flex; align-items:center; gap:6px; color:var(--text-3); font-size:.85rem; margin-bottom:28px }
  .back-link:hover { color:var(--brand); text-decoration:none }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px }
  .pass-wrap { position:relative }
  .pass-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-3) }
  .strength-bar { height:4px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden }
  .strength-fill { height:100%; border-radius:2px; transition:.3s; width:0% }
</style>
</head>
<body>

<div class="auth-box">
  <a href="../index.html" class="back-link">← Volver al inicio</a>

  <div style="margin-bottom:28px">
    <h2 style="font-family:var(--font-head)">Crear cuenta</h2>
    <p style="color:var(--text-3);font-size:.9rem;margin-top:4px">Completa los datos para registrarte</p>
  </div>

  <div id="alert-msg" class="alert alert-danger hidden"></div>
  <div id="success-msg" class="alert alert-success hidden"></div>

  <form id="register-form" novalidate>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="nombre" class="form-control" placeholder="Juan Pérez" required>
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="rol" class="form-control">
          <option value="vendedor">Vendedor</option>
          <option value="cajero">Cajero</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Correo electrónico *</label>
      <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
    </div>

    <div class="form-group">
      <label>Contraseña *</label>
      <div class="pass-wrap">
        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required oninput="checkStrength(this.value)">
        <button type="button" class="pass-toggle" onclick="togglePass('password')">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <small id="strength-label" style="color:var(--text-3);font-size:.78rem"></small>
    </div>

    <div class="form-group">
      <label>Confirmar contraseña *</label>
      <div class="pass-wrap">
        <input type="password" id="confirm" class="form-control" placeholder="Repite tu contraseña" required>
        <button type="button" class="pass-toggle" onclick="togglePass('confirm')">👁</button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full mt-16" id="btn-reg">
      Crear cuenta
    </button>
  </form>

  <p style="text-align:center;font-size:.88rem;margin-top:20px">
    ¿Ya tienes cuenta? <a href="../index.html"><strong>Iniciar sesión</strong></a>
  </p>
</div>

<script>
const API = 'http://localhost:3000/api';

function togglePass(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8)   score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const map = { 0:['0%',''], 1:['25%','Muy débil'], 2:['50%','Regular'], 3:['75%','Buena'], 4:['100%','Fuerte'] };
  const colors = ['','#ff3b3b','#ffb800','#0066ff','#00cc7a'];
  fill.style.width = map[score][0];
  fill.style.background = colors[score];
  label.textContent = map[score][1];
}

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  const nombre   = document.getElementById('nombre').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const rol      = document.getElementById('rol').value;
  const alertEl  = document.getElementById('alert-msg');
  const succEl   = document.getElementById('success-msg');

  alertEl.classList.add('hidden');
  if (password !== confirm) {
    alertEl.textContent = 'Las contraseñas no coinciden';
    alertEl.classList.remove('hidden');
    return;
  }
  if (password.length < 8) {
    alertEl.textContent = 'La contraseña debe tener al menos 8 caracteres';
    alertEl.classList.remove('hidden');
    return;
  }

  document.getElementById('btn-reg').textContent = 'Creando cuenta...';
  try {
    const res  = await fetch(`${API}/auth/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nombre, email, password, rol })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    succEl.textContent = '¡Cuenta creada! Redirigiendo al login...';
    succEl.classList.remove('hidden');
    setTimeout(() => window.location.href = '../index.html', 1800);
  } catch (err) {
    alertEl.textContent = err.message;
    alertEl.classList.remove('hidden');
  } finally {
    document.getElementById('btn-reg').textContent = 'Crear cuenta';
  }
});
</script>
</body>
</html>
